<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }
    .sidebar {
      height: 100vh;
      width: 220px;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #f8f9fa;
      padding-top: 50px;
      border-right: 1px solid #ddd;
    }
    .sidebar a {
      display: block;
      padding: 15px 20px;
      text-decoration: none;
      color: #000;
      font-weight: 600;
    }
    .sidebar a:hover {
      background-color: #e2e6ea;
    }
    .content {
      margin-left: 220px;
      padding: 30px;
    }
    .spot-box {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h3 class="text-center mb-4">Admin Panel</h3>
    <a href="/admin/dashboard">Home</a>
    <a href="/admin/users">Users</a>
    <a href="/admin/search">Search</a>
    <a href="/admin/summary">Summary</a>
    <a href="/logout">Logout</a>
  </div>
  <div class="content">
  <div class="container mt-5">
    <h2>Edit Parking Lot</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ lot.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" name="price" class="form-control" value="{{ lot.price }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control">{{ lot.address }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Pincode</label>
            <input type="text" name="pincode" class="form-control" value="{{ lot.pincode }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">No. of Spots</label>
            <input type="number" name="total_spots" class="form-control" value="{{ lot.total_spots }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</div>
</body>
</html>
