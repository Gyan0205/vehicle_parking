<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center fixed;
      background-size: cover;
    }
    .register-box {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="register-box">
  <h2 class="text-center mb-4">Register</h2>
  <form method="POST">
    <div class="mb-3">
      <label for="full_name" class="form-label">Full Name</label>
      <input name="full_name" type="text" class="form-control" id="full_name" required>
    </div>
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input name="username" type="text" class="form-control" id="username" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input name="password" type="password" class="form-control" id="password" required>
    </div>
    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <textarea class="form-control" name="address" rows="2" required></textarea>
    </div>
    <div class="mb-3">
      <label for="pin_code" class="form-label">PIN Code</label>
      <input name="pin_code" type="text" class="form-control" id="pin_code" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
  </form>

  {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
  {% endif %}
  
  {% if message %}
    <div class="alert alert-success mt-3">{{ message }}</div>
  {% endif %}

  <div class="mt-3 text-center">
    <a href="/">Back to Login</a>
  </div>
</div>

</body>
</html>
