<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      height: 100vh;
      width: 220px;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #f8f9fa;
      padding-top: 50px;
      border-right: 1px solid #ddd;
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      text-decoration: none;
      color: #000;
      font-weight: 600;
    }

    .sidebar a:hover {
      background-color: #e2e6ea;
    }

    .content {
      margin-left: 220px;
      padding: 30px;
    }

    .spot-box {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h3 class="text-center mb-4">Admin Panel</h3>
    <a href="/admin/dashboard">Home</a>
    <a href="/admin/users">Users</a>
    <a href="/admin/search">Search</a>
    <a href="/admin/summary">Summary</a>
    <a href="/logout">Logout</a>
  </div>
  <div class="content">
    <div class="container mt-4">
      <h2 class="mb-4">System Summary</h2>
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="card text-white bg-primary shadow">
            <div class="card-body text-center">
              <h5 class="card-title">Parking Lots</h5>
              <h2 class="display-5 fw-bold">{{ total_lots }}</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-white bg-info shadow">
            <div class="card-body text-center">
              <h5 class="card-title">Total Spots</h5>
              <h2 class="display-5 fw-bold">{{ total_spots }}</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-white bg-danger shadow">
            <div class="card-body text-center">
              <h5 class="card-title">Occupied Spots</h5>
              <h2 class="display-5 fw-bold">{{ occupied_spots }} / {{ total_spots }}</h2>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card text-white bg-secondary shadow">
            <div class="card-body text-center">
              <h5 class="card-title">Total Reservations</h5>
              <h2 class="display-5 fw-bold">{{ total_reservations }}</h2>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card text-white bg-success shadow">
            <div class="card-body text-center">
              <h5 class="card-title">Active Reservations</h5>
              <h2 class="display-5 fw-bold">{{ active_reservations }}</h2>
            </div>
          </div>
        </div>
      </div>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
