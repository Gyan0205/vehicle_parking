apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-parking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parking-app
  template:
    metadata:
      labels:
        app: parking-app
    spec:
      containers:
      - name: flask-app
        image: yourdockerhub/vehicle-parking-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: parking-app-service
spec:
  selector:
    app: parking-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
